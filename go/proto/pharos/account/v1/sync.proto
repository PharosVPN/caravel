syntax = "proto3";

// Package pharos.account.v1 is the relayed client account & sync contract
// (DESIGN §8). caravel reaches AccountSync through a relay relay; coxswain never
// exposes it on a public port. coxswain serves only ciphertext — a compromised
// remote relay cannot read user profiles.
package pharos.account.v1;

// AccountSync authenticates end users and serves their end-to-end-encrypted
// profile bundles. After Authenticate, the client carries the returned session
// token in the "pharos-session" request metadata.
service AccountSync {
  // Authenticate verifies an account passphrase and opens a session.
  rpc Authenticate(AuthenticateRequest) returns (AuthenticateResponse);

  // EnrollKeys registers a user's X25519 public key and the passphrase-wrapped
  // private key blob on first device setup (DESIGN §8).
  rpc EnrollKeys(EnrollKeysRequest) returns (EnrollKeysResponse);

  // GetProfile returns the user's latest sealed profile bundle. The bundle is
  // ciphertext; only the user's device can decrypt it.
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);

  // ClaimEnrollment redeems a one-time enrollment ticket (the token from a
  // join-link/QR) plus a device-generated CSR into a fully enrolled, provisioned
  // device. It is TOKEN-authenticated, not cert-authenticated: the device has no
  // Device-CA leaf yet — this RPC mints it — so unlike every other AccountSync
  // method it must be reachable over a cert-less relay connection (a later relay
  // change). The token is the sole credential; a valid token yields a signed leaf
  // and everything the device needs to assemble its own bundle and sync.
  rpc ClaimEnrollment(ClaimEnrollmentRequest) returns (ClaimEnrollmentResponse);
}

message AuthenticateRequest {
  string email = 1;
  string password = 2;
}

message AuthenticateResponse {
  string session_token = 1;
  string user_id = 2;
  // keys_enrolled is false until the user has called EnrollKeys.
  bool keys_enrolled = 3;
}

message EnrollKeysRequest {
  bytes public_key = 1;
  bytes wrapped_private_key = 2;
}

message EnrollKeysResponse {}

message GetProfileRequest {}

message GetProfileResponse {
  // ciphertext is the sealed profile bundle (an e2e.SealedBundle).
  bytes ciphertext = 1;
  int64 revision = 2;
  // signing_public_key is coxswain's Ed25519 profile-signing key — the device
  // verifies the bundle against it.
  bytes signing_public_key = 3;
  // wrapped_private_key is the user's passphrase-wrapped X25519 private key, so
  // a legacy account-sync device can unwrap it locally with the account
  // passphrase. It is EMPTY for a per-device-keyed device (one enrolled via the
  // passphrase-less join-link flow): that device's bundle is sealed to the
  // device's own X25519 key, which it already holds, so there is nothing to
  // unwrap.
  bytes wrapped_private_key = 4;
}

message ClaimEnrollmentRequest {
  // token is the plaintext one-time enrollment token from the join-link/QR. It
  // is the only credential — the device presents no client certificate.
  string token = 1;
  // csr_pem is the device-generated PKCS#10 CSR (PEM). The device keeps the
  // matching private key; coxswain signs only the public key into a leaf.
  bytes csr_pem = 2;
  // device_name is the device's friendly alias, recorded on the device record.
  string device_name = 3;
  // platform is the device OS/kind (e.g. "ios", "android", "caravel").
  string platform = 4;
  // encryption_pubkey is a 32-byte X25519 public key the device generates
  // on-device (separate from the CSR's mTLS key). coxswain seals this device's
  // profile bundle to it, so the device decrypts with its OWN private key —
  // no account passphrase. The private half never leaves the device. The join
  // flow requires it: a missing or non-32-byte key is rejected.
  bytes encryption_pubkey = 5;
}

message ClaimEnrollmentResponse {
  // device_cert_pem is the signed Device-CA client leaf (PEM). With its kept
  // private key the device now authenticates to the relay by mTLS.
  bytes device_cert_pem = 1;
  // fleet_ca_pem is the Fleet CA (PEM) the device pins to verify the relay.
  bytes fleet_ca_pem = 2;
  // relay_addr is the public relay endpoint the device syncs through.
  string relay_addr = 3;
  // relay_server_name is the relay-cert SAN the device verifies (TLS SNI).
  string relay_server_name = 4;
  // ca_fingerprint is the root CA fingerprint the device pins (matches the
  // enrollment ticket's `ca` parameter).
  string ca_fingerprint = 5;
  // signing_public_key is coxswain's Ed25519 profile-signing public key, so the
  // device can verify sealed bundles it later fetches with GetProfile.
  bytes signing_public_key = 6;
}
